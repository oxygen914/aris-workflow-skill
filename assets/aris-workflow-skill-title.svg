<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARIS Workflow Skill</title>
  <desc id="desc">Pixel-art title for the ARIS Workflow Skill, built on the ARIS (Auto-claude-code-research-in-sleep) project. Turns research ideas into executable thesis workflow plans.</desc>
  <style>
    .title { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 60px; font-weight: 700; letter-spacing: 1px; fill: #1f2937; }
    .sub   { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 19px; font-weight: 500; letter-spacing: 1px; fill: #6b7280; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #f8fafc; }
      .sub   { fill: #94a3b8; }
      .bg    { fill: #0f172a; }
      .grid  { stroke: #1e293b; }
    }
  </style>

  <!-- background + pixel grid -->
  <rect class="bg" x="0" y="0" width="900" height="220" fill="#fafbfc"/>
  <g class="grid" stroke="#e5e7eb" stroke-width="1" opacity="0.7">
    <path d="M0 30H900M0 60H900M0 90H900M0 120H900M0 150H900M0 180H900"/>
    <path d="M60 0V220M150 0V220M240 0V220M330 0V220M420 0V220M510 0V220M600 0V220M690 0V220M780 0V220"/>
  </g>
  <rect x="2" y="2" width="896" height="216" fill="none" stroke="#4A9EDA" stroke-width="3" rx="4"/>

  <!-- pixel crescent moon (sleep / research-in-sleep nod to ARIS) -->
  <g transform="translate(120,46)" shape-rendering="crispEdges">
    <!-- moon disc -->
    <g fill="#da8a4a">
      <rect x="20" y="6"  width="6" height="6"/>
      <rect x="14" y="12" width="18" height="6"/>
      <rect x="8"  y="18" width="30" height="6"/>
      <rect x="8"  y="24" width="30" height="6"/>
      <rect x="8"  y="30" width="30" height="6"/>
      <rect x="14" y="36" width="18" height="6"/>
      <rect x="20" y="42" width="6" height="6"/>
    </g>
    <!-- bite out of the right side to make a crescent -->
    <g fill="#fafbfc">
      <rect x="26" y="12" width="12" height="6"/>
      <rect x="26" y="18" width="18" height="6"/>
      <rect x="26" y="24" width="18" height="6"/>
      <rect x="26" y="30" width="12" height="6"/>
    </g>
    <!-- star -->
    <rect x="44" y="6" width="4" height="4" fill="#4A9EDA"/>
    <rect x="50" y="14" width="4" height="4" fill="#4aaa4a"/>
  </g>

  <!-- pixel chevron stages -->
  <g transform="translate(388,96)" shape-rendering="crispEdges">
    <g fill="#4A9EDA">
      <rect x="0"  y="6"  width="6" height="6"/>
      <rect x="6"  y="12" width="6" height="6"/>
      <rect x="12" y="18" width="6" height="6"/>
      <rect x="6"  y="24" width="6" height="6"/>
      <rect x="0"  y="30" width="6" height="6"/>
    </g>
    <g fill="#da8a4a">
      <rect x="30" y="6"  width="6" height="6"/>
      <rect x="36" y="12" width="6" height="6"/>
      <rect x="42" y="18" width="6" height="6"/>
      <rect x="36" y="24" width="6" height="6"/>
      <rect x="30" y="30" width="6" height="6"/>
    </g>
    <g fill="#4aaa4a">
      <rect x="60" y="6"  width="6" height="6"/>
      <rect x="66" y="12" width="6" height="6"/>
      <rect x="72" y="18" width="6" height="6"/>
      <rect x="66" y="24" width="6" height="6"/>
      <rect x="60" y="30" width="6" height="6"/>
    </g>
  </g>

  <!-- pixel plan document with check -->
  <g transform="translate(696,72)" shape-rendering="crispEdges">
    <rect x="0" y="0" width="54" height="72" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
    <g fill="#9ca3af">
      <rect x="9"  y="12" width="36" height="5"/>
      <rect x="9"  y="24" width="36" height="5"/>
      <rect x="9"  y="36" width="24" height="5"/>
    </g>
    <!-- check stamp -->
    <g fill="#4aaa4a">
      <rect x="33" y="51" width="6" height="6"/>
      <rect x="27" y="57" width="6" height="6"/>
      <rect x="21" y="51" width="6" height="6"/>
      <rect x="39" y="45" width="6" height="6"/>
    </g>
  </g>

  <text class="title" x="450" y="120" text-anchor="middle">ARIS Workflow Skill</text>
  <text class="sub"   x="450" y="150" text-anchor="middle">研究想法 → 可执行的论文计划书</text>

  <!-- pixel divider -->
  <g shape-rendering="crispEdges">
    <g fill="#4A9EDA"><rect x="300" y="176" width="6" height="6"/></g>
    <g fill="#da8a4a"><rect x="330" y="176" width="6" height="6"/></g>
    <g fill="#4aaa4a"><rect x="360" y="176" width="6" height="6"/></g>
    <g fill="#4A9EDA"><rect x="390" y="176" width="6" height="6"/></g>
    <g fill="#da8a4a"><rect x="420" y="176" width="6" height="6"/></g>
    <g fill="#4aaa4a"><rect x="450" y="176" width="6" height="6"/></g>
    <g fill="#4A9EDA"><rect x="480" y="176" width="6" height="6"/></g>
    <g fill="#da8a4a"><rect x="510" y="176" width="6" height="6"/></g>
    <g fill="#4aaa4a"><rect x="540" y="176" width="6" height="6"/></g>
    <g fill="#4A9EDA"><rect x="570" y="176" width="6" height="6"/></g>
    <g fill="#da8a4a"><rect x="600" y="176" width="6" height="6"/></g>
  </g>
</svg>
